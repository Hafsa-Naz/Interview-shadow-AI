services:
  - type: web
    name: interview-shadow-ai-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r render-requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5
